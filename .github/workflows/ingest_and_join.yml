name: Ingest Kaggle Data and Join

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday at midnight UTC
  workflow_dispatch: # Allow manual triggers

jobs:
  ingest-and-join:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        
      - name: Ingest datasets from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python src/ingest_data.py
        
      - name: Join datasets
        run: python src/join_datasets.py
        
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/hot100.csv
          git add "data/Global Music Artists.csv"
          git add data/hot100_with_genre.csv
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Update datasets and genre join [skip ci]"
          git push
